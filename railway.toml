[build]
builder = "nixpacks"
buildCommand = "cd server && bun install && cd ../client && bun install && bun run build"

[deploy]
# drizzle-kit push runs before the server starts so the schema is always in sync
startCommand = "cd server && bunx drizzle-kit push && bun run src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
